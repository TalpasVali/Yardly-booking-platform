<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Yardly Sports Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#32cd32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#072a1c",
                        "surface-dark": "#0a3624",
                        "border-dark": "#1a4d36",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col items-center justify-center px-6 py-10">
<!-- Content Container -->
<div class="layout-content-container flex flex-col w-full max-w-[440px] gap-8">
<!-- Logo Header -->
<header class="flex flex-col items-center justify-center gap-4 mb-4">
<div class="flex items-center gap-3 text-primary">
<div class="size-10 bg-primary/20 flex items-center justify-center rounded-xl">
<span class="material-symbols-outlined text-3xl" data-icon="sports_football">sports_football</span>
</div>
<h1 class="text-3xl font-black leading-tight tracking-[-0.033em] uppercase">Yardly</h1>
</div>
</header>
<!-- Hero Illustration / Image Area -->
<div class="@container">
<div class="w-full bg-center bg-no-repeat bg-cover flex flex-col justify-end overflow-hidden rounded-xl min-h-[180px] border border-border-dark shadow-2xl" data-alt="Abstract green grass field at stadium night" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuDUyX_dRNI_a1FIsFXYjcZMQLh70IvO0Sjp-q5DMFiK3d1qrKR2OqVgCxlPkLZga9X90l8sYNSTAsHtpyRPK4I2GUp15t_NBeacTOITvNha931tPKPDG6pyFgtDr0IuxiMNi7lGepJ0jwNXkRkr45Fvcg20HW7-PotKBQJbgtiZFtv1nX_4ztlWfSzF2QSrgK8DOZe9suTLEl32-LRTmsvGLyTmwVcExXyMVO63bgB8rcsRJbNxN2qEWW_qecZucJ_1oDSu1T2nLq0");'>
</div>
</div>
<!-- Welcome Text -->
<div class="flex flex-col gap-2 text-center">
<h2 class="text-3xl font-extrabold tracking-tight">Welcome Back</h2>
<p class="text-slate-400 text-base">Sign in to your sports hub</p>
</div>
<!-- Form Section -->
<div class="flex flex-col gap-5">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-300 ml-1">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">mail</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-dark bg-surface-dark/50 focus:border-primary h-14 pl-12 pr-4 placeholder:text-slate-500 transition-all" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-semibold text-slate-300">Password</label>
<a class="text-xs font-bold text-primary hover:underline" href="#">Forgot?</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-primary transition-colors">lock</span>
<input class="form-input flex w-full rounded-xl text-slate-100 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-border-dark bg-surface-dark/50 focus:border-primary h-14 pl-12 pr-12 placeholder:text-slate-500 transition-all" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-4 mt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-extrabold text-lg h-14 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
<span>Sign In</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<div class="flex items-center gap-4 my-2">
<div class="h-[1px] bg-border-dark grow"></div>
<span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Or continue with</span>
<div class="h-[1px] bg-border-dark grow"></div>
</div>
<button class="w-full bg-white text-slate-900 font-bold text-base h-14 rounded-xl shadow-sm hover:bg-slate-100 transition-all flex items-center justify-center gap-3">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span>Google</span>
</button>
</div>
</div>
<!-- Footer Sign Up -->
<div class="text-center mt-4">
<p class="text-slate-400">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline" href="#">Join the Yard</a>
</p>
</div>
</div>
<!-- Decorative Elements (Mobile Optimized) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-primary/20 overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full"></div>
</div>
</div>
</div>
</body></html>
