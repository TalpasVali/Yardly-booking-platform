<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Yardly Sports Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#21c45d",
              "background-light": "#f6f8f7",
              "background-dark": "#122017",
            },
            fontFamily: {
              "display": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-4 md:px-40 flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col max-w-[480px] flex-1">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-primary/10 px-4 py-3 mb-8">
<div class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined">sports_tennis</span>
</div>
<h2 class="text-xl font-black leading-tight tracking-tight">Yardly</h2>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-full h-10 px-4 bg-primary/10 text-primary text-sm font-bold leading-normal tracking-wide transition-colors hover:bg-primary/20">
<span class="truncate">Join Yardly</span>
</button>
</header>
<!-- Hero Header Section -->
<div class="flex flex-col gap-3 p-4 mb-4">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-black leading-tight tracking-[-0.033em]">Welcome back</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal">Log in to your Yardly account to manage your sports sessions, bookings, and team activities.</p>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-y-2">
<!-- Email Input -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal pb-2">Email address</p>
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-slate-900 focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-primary/20 bg-white dark:bg-slate-800 dark:text-slate-100 h-14 placeholder:text-slate-400 p-[15px] text-base font-normal leading-normal" placeholder="name@example.com" type="email" value=""/>
</label>
</div>
<!-- Password Input -->
<div class="flex flex-wrap items-end gap-4 px-4 py-3">
<label class="flex flex-col min-w-40 flex-1">
<div class="flex justify-between items-center pb-2">
<p class="text-slate-900 dark:text-slate-100 text-sm font-semibold leading-normal">Password</p>
<a class="text-primary text-xs font-bold hover:underline" href="#">Forgot password?</a>
</div>
<div class="flex w-full flex-1 items-stretch rounded-xl overflow-hidden border border-primary/20 focus-within:ring-2 focus-within:ring-primary/50">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden border-none bg-white dark:bg-slate-800 text-slate-900 dark:text-slate-100 h-14 placeholder:text-slate-400 p-[15px] pr-2 text-base font-normal leading-normal focus:ring-0" placeholder="••••••••" type="password" value=""/>
<div class="text-slate-400 flex bg-white dark:bg-slate-800 items-center justify-center pr-[15px] cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<!-- Submit Button -->
<div class="px-4 py-4">
<button class="w-full flex cursor-pointer items-center justify-center overflow-hidden rounded-xl h-14 px-4 bg-primary text-white text-base font-extrabold leading-normal tracking-wide shadow-lg shadow-primary/20 hover:bg-primary/90 transition-all active:scale-[0.98]">
<span class="truncate">Sign In</span>
</button>
</div>
</div>
<!-- Divider -->
<div class="flex items-center gap-4 px-4 py-6">
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
<span class="text-slate-400 text-xs font-bold uppercase tracking-widest">or continue with</span>
<div class="h-px flex-1 bg-slate-200 dark:bg-slate-700"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-3 px-4 pb-10">
<button class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4 text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                            Google
                        </button>
<button class="flex w-full items-center justify-center gap-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 h-12 px-4 text-slate-700 dark:text-slate-200 font-semibold text-sm hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors">
<svg class="w-5 h-5 fill-current" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.671-1.48 3.671-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.605 1.09zM15.53 4.654c.844-1.026 1.402-2.454 1.247-3.87-1.208.052-2.675.818-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.558-1.662z"></path>
</svg>
                            Apple ID
                        </button>
</div>
<!-- Footer registration flow -->
<div class="px-4 py-6 mt-auto text-center border-t border-primary/5">
<p class="text-slate-500 dark:text-slate-400 text-sm font-medium">
                            Don't have an account? 
                            <a class="text-primary font-bold hover:underline ml-1" href="#">Create an account</a>
</p>
</div>
<!-- Decorative background elements (subtle) -->
<div class="fixed top-0 right-0 -z-10 opacity-10 pointer-events-none">
<svg fill="none" height="400" viewbox="0 0 400 400" width="400" xmlns="http://www.w3.org/2000/svg">
<circle cx="350" cy="50" fill="url(#paint0_radial)" r="150"></circle>
<defs>
<radialgradient cx="0" cy="0" gradienttransform="translate(350 50) rotate(90) scale(150)" gradientunits="userSpaceOnUse" id="paint0_radial" r="1">
<stop stop-color="#21c45d"></stop>
<stop offset="1" stop-color="#21c45d" stop-opacity="0"></stop>
</radialgradient>
</defs>
</svg>
</div>
</div>
</div>
</div>
</div>
</body></html>
