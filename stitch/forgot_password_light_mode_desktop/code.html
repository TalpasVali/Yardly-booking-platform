<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22C55E",
                        "background-light": "#F8FAFC",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<title>Forgot Password - Yardly</title>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 md:px-20 py-4">
<div class="flex items-center gap-2 text-primary">
<div class="size-8 flex items-center justify-center bg-primary/10 rounded-lg">
<span class="material-symbols-outlined text-primary">sports_kabaddi</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">Yardly</h2>
</div>
<button class="flex items-center justify-center rounded-lg h-10 px-6 bg-primary text-white text-sm font-bold hover:bg-primary/90 transition-colors">
                    Sign In
                </button>
</header>
<!-- Main Content Area -->
<main class="flex flex-1 items-center justify-center p-6">
<div class="w-full max-w-[440px] flex flex-col gap-8">
<!-- Form Card -->
<div class="bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex flex-col items-center text-center mb-8">
<div class="size-16 bg-primary/10 rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
</div>
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">Forgot password?</h1>
<p class="text-slate-500 dark:text-slate-400 mt-2">No worries, we'll send you reset instructions.</p>
</div>
<!-- Illustration/Decorative Image -->
<div class="mb-8 overflow-hidden rounded-lg bg-slate-50 dark:bg-slate-800 h-40 flex items-center justify-center relative">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent" data-alt="Abstract green pattern for background decoration"></div>
<span class="material-symbols-outlined text-primary/30 text-7xl">mail</span>
</div>
<form class="flex flex-col gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="flex w-full rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-800 py-3 pl-10 pr-4 text-slate-900 dark:text-white placeholder:text-slate-400 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" id="email" placeholder="Enter your email" type="email"/>
</div>
</div>
<button class="flex w-full items-center justify-center rounded-lg h-12 bg-primary text-white text-base font-bold hover:bg-primary/90 transition-all shadow-md shadow-primary/20" type="submit">
                                Send reset link
                            </button>
</form>
<div class="mt-8 flex justify-center">
<a class="flex items-center gap-2 text-slate-500 hover:text-primary dark:text-slate-400 dark:hover:text-primary transition-colors text-sm font-semibold" href="#">
<span class="material-symbols-outlined text-lg">arrow_back</span>
                                Back to log in
                            </a>
</div>
</div>
<!-- Footer Help -->
<div class="text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                            Don't have an account? 
                            <a class="text-primary font-bold hover:underline" href="#">Sign up</a>
</p>
</div>
</div>
</main>
<!-- Bottom decorative footer -->
<footer class="px-6 py-8 flex flex-col md:flex-row items-center justify-between text-slate-400 text-xs border-t border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50">
<div class="flex items-center gap-4 mb-4 md:mb-0">
<p>© 2024 Yardly Sports Platform</p>
<a class="hover:text-primary" href="#">Privacy Policy</a>
<a class="hover:text-primary" href="#">Terms of Service</a>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-lg">language</span>
<span>English (US)</span>
</div>
</footer>
</div>
</div>
</body></html>
