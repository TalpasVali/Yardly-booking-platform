<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Field Editor - Yardly</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3fe97d",
                        "primary-dark": "#22C55E",
                        "background-light": "#f6f8f7",
                        "background-dark": "#112117",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<!-- Mobile View Wrapper (Max width 480px simulated for desktop preview but responsive) -->
<div class="relative flex flex-col min-h-screen max-w-md mx-auto bg-background-light dark:bg-background-dark shadow-2xl border-x border-slate-200 dark:border-slate-800">
<!-- Header -->
<header class="sticky top-0 z-30 flex items-center justify-between bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-3 border-b border-slate-200 dark:border-slate-800">
<div class="flex items-center gap-3">
<button class="p-1 text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold">Edit Field</h1>
</div>
<button class="text-primary-dark font-semibold text-sm">Preview</button>
</header>
<main class="flex-1 pb-32">
<!-- Progress Stepper -->
<div class="px-4 py-4 flex items-center gap-2 overflow-x-auto hide-scrollbar">
<span class="px-3 py-1 bg-primary text-slate-900 text-xs font-bold rounded-full whitespace-nowrap">1. Basics</span>
<div class="h-px w-4 bg-slate-300"></div>
<span class="px-3 py-1 bg-slate-200 dark:bg-slate-800 text-slate-500 text-xs font-bold rounded-full whitespace-nowrap">2. Location</span>
<div class="h-px w-4 bg-slate-300"></div>
<span class="px-3 py-1 bg-slate-200 dark:bg-slate-800 text-slate-500 text-xs font-bold rounded-full whitespace-nowrap">3. Pricing</span>
</div>
<!-- Content Cards -->
<div class="px-4 space-y-6">
<!-- Photos Section -->
<section>
<h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">Field Photos</h2>
<div class="grid grid-cols-3 gap-2">
<div class="aspect-square rounded-lg bg-slate-100 dark:bg-slate-800 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 dark:border-slate-700 cursor-pointer">
<span class="material-symbols-outlined text-slate-400">add_a_photo</span>
<span class="text-[10px] text-slate-400 mt-1">Add</span>
</div>
<div class="relative aspect-square rounded-lg overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Close up of a green soccer field grass" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDpFCfihcdV8an49F9zfNmyMAfUXV11Gz4b59byb2WaUqvNZWAsuGTS94dJduypGIopmyxq4AIeNiozR79y5bETmYvx3vWEn_boHKMb7LWfBAqbi2hegItez21ow0zwFCSN_ln3B4NEj3kh7HKoAToP_lbVag5bzjW8udj1OHq1m45HktZKPyFYVnA36fqybhz7nPprfak3Es372fRedYKTprKgP7WnM9-P6PwLL6FRqIrz0wnK3oXn5AzKHLpVse6qmPK7ZvGoccE"/>
<button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
<div class="relative aspect-square rounded-lg overflow-hidden">
<img class="w-full h-full object-cover" data-alt="Wide shot of a soccer stadium from the stands" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_OM8seZ9RsbbOzLdEUMgJbuC6qYxb2WBx2VI4beaiqqCdt2lypZGiEG6pakIzvYemWOlil5zOSQD5yCnOHADuEGmAatARiW85lM8gSvuvW2ZZM4zRbNIWxp02bMtH7QCuLTF3oET9TNmQkPUrSftqS7nrLXp4oRnsUPCBDyoAFfGfQ2BwWvVUU1hPR010t4IugozUYoZeY96kK-CyjDmVG8SgazgT4PQYzRu3JFWymLLtEESKzvWyqlcKBtbKrFyZupIf8FUtYWU"/>
<button class="absolute top-1 right-1 bg-black/50 text-white rounded-full p-0.5">
<span class="material-symbols-outlined text-sm">close</span>
</button>
</div>
</div>
</section>
<!-- Basic Info Form -->
<section class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="space-y-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Field Name</label>
<input class="w-full p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="e.g. Central Park Pitch A" type="text" value="Emerald Arena #1"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Description</label>
<textarea class="w-full p-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-background-light dark:bg-background-dark focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all" placeholder="Describe your field..." rows="3">Premium synthetic turf, perfect for 7-a-side matches. Recently renovated with professional lighting.</textarea>
</div>
</div>
</section>
<!-- Sport Type (Selectors) -->
<section>
<h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">Sport Type</h2>
<div class="flex flex-wrap gap-2">
<button class="flex items-center gap-2 px-4 py-2 bg-primary/20 border-2 border-primary text-slate-900 dark:text-slate-100 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-sm">sports_soccer</span> Soccer
                        </button>
<button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-sm">sports_basketball</span> Basketball
                        </button>
<button class="flex items-center gap-2 px-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-slate-400 rounded-full text-sm font-medium">
<span class="material-symbols-outlined text-sm">sports_tennis</span> Tennis
                        </button>
</div>
</section>
<!-- Surface Type -->
<section>
<h2 class="text-sm font-bold uppercase tracking-wider text-slate-500 mb-3">Surface Type</h2>
<div class="grid grid-cols-2 gap-3">
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer ring-2 ring-primary">
<div class="size-4 rounded-full border-4 border-primary bg-white"></div>
<span class="text-sm font-medium">Artificial Turf</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer">
<div class="size-4 rounded-full border-2 border-slate-300 dark:border-slate-600"></div>
<span class="text-sm font-medium">Natural Grass</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer">
<div class="size-4 rounded-full border-2 border-slate-300 dark:border-slate-600"></div>
<span class="text-sm font-medium">Indoor Court</span>
</div>
<div class="flex items-center gap-3 p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl cursor-pointer">
<div class="size-4 rounded-full border-2 border-slate-300 dark:border-slate-600"></div>
<span class="text-sm font-medium">Clay</span>
</div>
</div>
</section>
<!-- Availability Preview -->
<section class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
<div class="flex justify-between items-center mb-4">
<h2 class="text-sm font-bold uppercase tracking-wider text-slate-500">Operating Hours</h2>
<button class="text-xs text-primary-dark font-bold underline">Manage Schedule</button>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center text-sm py-1">
<span class="text-slate-600 dark:text-slate-400">Mon - Fri</span>
<span class="font-medium">08:00 AM - 10:00 PM</span>
</div>
<div class="flex justify-between items-center text-sm py-1 border-t border-slate-50 dark:border-slate-800">
<span class="text-slate-600 dark:text-slate-400">Sat - Sun</span>
<span class="font-medium">07:00 AM - 11:00 PM</span>
</div>
</div>
</section>
</div>
</main>
<!-- Sticky Bottom Action Bar -->
<footer class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-white dark:bg-background-dark border-t border-slate-200 dark:border-slate-800 p-4 pb-8 z-40">
<div class="flex gap-3">
<button class="flex-1 py-3 px-4 rounded-xl border border-slate-200 dark:border-slate-700 font-bold text-slate-700 dark:text-slate-300 bg-white dark:bg-slate-800 transition-colors">
                    Save Draft
                </button>
<button class="flex-[1.5] py-3 px-4 rounded-xl bg-primary-dark text-white font-bold shadow-lg shadow-primary-dark/30 flex items-center justify-center gap-2">
                    Publish Field <span class="material-symbols-outlined text-lg">rocket_launch</span>
</button>
</div>
</footer>
<!-- Bottom Navigation (Miniature indicator) -->
<div class="fixed bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-slate-300 dark:bg-slate-700 rounded-full z-50"></div>
</div>
</body></html>
