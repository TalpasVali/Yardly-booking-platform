<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Yardly Sports Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#32cd32",
                        "background-light": "#f6f8f6",
                        "background-dark": "#072a1c",
                        "card-dark": "#114d31",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="flex min-h-screen w-full flex-col lg:flex-row">
<!-- Left Side: Hero/Illustration Section -->
<div class="hidden lg:flex lg:w-1/2 flex-col justify-center items-center p-12 relative overflow-hidden bg-primary/10">
<div class="absolute inset-0 z-0 opacity-20">
<div class="absolute top-0 -left-20 w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
<div class="absolute bottom-0 -right-20 w-96 h-96 bg-primary rounded-full blur-[120px]"></div>
</div>
<div class="relative z-10 max-w-lg text-center lg:text-left">
<div class="mb-8 inline-flex items-center gap-3 text-primary">
<span class="material-symbols-outlined text-4xl">sports_soccer</span>
<span class="text-3xl font-bold tracking-tight">Yardly</span>
</div>
<h1 class="text-5xl lg:text-7xl font-black leading-tight tracking-tight mb-6">
                    Book sports fields <span class="text-primary">faster</span>
</h1>
<p class="text-xl text-slate-400 dark:text-slate-300 mb-10 leading-relaxed">
                    Experience the high-energy sports platform for athletes. Manage bookings, teams, and matches in one place.
                </p>
<div class="rounded-xl overflow-hidden shadow-2xl border border-primary/20">
<div class="w-full aspect-video bg-cover bg-center" data-alt="High energy floodlit football stadium at night" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBGvt4FpfNP5svZzCSZATORLuBNjEHMi4dc_dfH4KIZvSGhfUGa39OcSBiGAgVI60jxNdL0ihtIbYVwmtbTKxY4ZqOYQqNvp2sTZj4hkMuUi9RcIRUX1WtDHOdXoae3y15CV2c48dtuND2oxFuFbcCu8iwqYYL2HhpJB6zXccPkwoCai9WcK-vuBr_jefJ63cHz2AJBFiS5gJmd5j6F1GDOwA57tBBwAcsNW_YKy16yndq9qrGD38tkIHcExH6A1avKBdzuPSwJgHI')"></div>
</div>
</div>
</div>
<!-- Right Side: Login Form Section -->
<div class="flex-1 flex items-center justify-center p-6 sm:p-12 lg:p-20">
<div class="w-full max-w-[480px] bg-card-dark rounded-xl p-8 sm:p-12 shadow-2xl border border-primary/10">
<div class="flex flex-col gap-2 mb-8">
<h2 class="text-3xl font-black tracking-tight text-white">Welcome back</h2>
<p class="text-slate-300 text-base font-normal">Enter your credentials to access your Yardly account.</p>
</div>
<form class="flex flex-col gap-5">
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Email</label>
<input class="form-input w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-background-dark/50 h-14 placeholder:text-slate-400 p-[15px] text-base" data-alt="Email input field" placeholder="Enter your email" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="text-white text-sm font-medium leading-normal ml-1">Password</label>
<div class="relative flex items-center">
<input class="form-input w-full rounded-xl text-white focus:outline-0 focus:ring-2 focus:ring-primary border border-primary/20 bg-background-dark/50 h-14 placeholder:text-slate-400 p-[15px] text-base" data-alt="Password input field" placeholder="Enter your password" type="password"/>
<button class="absolute right-4 text-slate-400 hover:text-primary" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
<div class="flex justify-end">
<a class="text-xs text-primary font-medium hover:underline mt-1" href="#">Forgot password?</a>
</div>
</div>
<!-- Login Button -->
<button class="mt-4 flex w-full cursor-pointer items-center justify-center rounded-full h-14 bg-primary text-background-dark text-lg font-bold transition-transform hover:scale-[1.02] active:scale-[0.98]" type="submit">
                        Login
                    </button>
<!-- Divider -->
<div class="flex items-center gap-4 my-2">
<div class="h-[1px] flex-1 bg-primary/20"></div>
<span class="text-xs text-slate-400 font-medium uppercase tracking-wider">or</span>
<div class="h-[1px] flex-1 bg-primary/20"></div>
</div>
<!-- Social Login -->
<button class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-full h-14 bg-transparent border border-primary/30 text-white text-base font-semibold hover:bg-white/5 transition-colors" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Continue with Google
                    </button>
</form>
<div class="mt-10 text-center">
<p class="text-slate-300">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline ml-1" href="#">Register now</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
